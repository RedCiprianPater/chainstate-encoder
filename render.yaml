# ─────────────────────────────────────────────────────────────
# Render Blueprint · chainstate-encoder
# ─────────────────────────────────────────────────────────────
# When you connect this repo to Render, this file auto-configures
# the service. You can also configure manually via the Render UI
# (see DEPLOY.md in this directory).
# ─────────────────────────────────────────────────────────────
services:
  - type: web
    name: chainstate-encoder
    runtime: python
    plan: starter  # 512 MB RAM · 0.5 CPU · $7/mo · enough for MiniLM-L6-v2
    region: frankfurt  # or oregon / singapore — pick closest to your workers
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: MODEL_NAME
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: CACHE_MAX
        value: "10000"
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11.10"
      # API_KEY intentionally not listed — set manually in Render UI as
      # a secret if you want to require bearer auth on POST endpoints.
